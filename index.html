<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大相撲分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --crimson: #8B1A1A;
  --crimson-dark: #5C0D0D;
  --crimson-light: #B22222;
  --gold: #C8961E;
  --cream: #FDF6ED;
  --paper: #F5E6D3;
  --ink: #2C1810;
  --ink-light: #7A5C4E;
  --border: #D4B896;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

/* ── Header ── */
.site-header {
  background: linear-gradient(135deg, var(--crimson-dark) 0%, var(--crimson) 100%);
  color: white; padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 12px rgba(92,13,13,.45);
  position: sticky; top: 0; z-index: 100;
}
.site-header h1 { font-size: 1.55rem; letter-spacing: .15em; text-shadow: 1px 1px 2px rgba(0,0,0,.3); }
.site-header h1 span { display:block; font-size:.72rem; letter-spacing:.1em; opacity:.8; margin-top:2px; font-weight:normal; }
.basho-badge { background: rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); padding:6px 14px; border-radius:20px; font-size:.85rem; }

/* ── Tabs ── */
.tab-nav { background: var(--crimson); display:flex; padding:0 8px; border-bottom:2px solid var(--crimson-dark); }
.tab-btn { padding:12px 20px; color:rgba(255,255,255,.6); cursor:pointer; font-size:.95rem; border:none; background:none; font-family:inherit; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; letter-spacing:.05em; }
.tab-btn:hover { color:rgba(255,255,255,.9); }
.tab-btn.active { color:white; border-bottom-color:var(--gold); background:rgba(255,255,255,.1); }

/* ── Layout ── */
.tab-content { display:none; }
.tab-content.active { display:block; }
.content-area { max-width:1100px; margin:0 auto; padding:24px 16px; }

/* ── Loading / Error ── */
.loading-box { text-align:center; padding:64px 24px; color:var(--ink-light); }
.spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--crimson); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.error-box { background:#fff0f0; border:1px solid #ffcccc; border-left:4px solid var(--crimson); border-radius:8px; padding:16px 20px; color:var(--crimson); margin:16px 0; }

/* ── Banzuke ── */
.banzuke-title { text-align:center; margin-bottom:20px; }
.banzuke-title h2 { font-size:1.4rem; color:var(--crimson-dark); letter-spacing:.1em; }
.banzuke-title p { color:var(--ink-light); font-size:.85rem; margin-top:4px; }
.banzuke-table { width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.banzuke-table tr:hover td { background:#fff5f5; }
.banzuke-table tr:hover td.center { background:var(--crimson-dark); }
.banzuke-table td { padding:5px 8px; vertical-align:middle; border-bottom:1px solid #f5ebe0; }
.banzuke-table td.center { text-align:center; background:var(--crimson-dark); color:white; font-size:.78rem; width:86px; white-space:nowrap; letter-spacing:.04em; }
.banzuke-table td.east-cell { text-align:right; }
.banzuke-table td.west-cell { text-align:left; }
.tr-yokozuna td.center { background:#3D0A0A; }
.tr-ozeki td.center { background:#5C1010; }
.tr-sekiwake td.center { background:#7A1515; }
.tr-komusubi td.center { background:#8B1A1A; }

.r-btn { display:inline-flex; align-items:center; gap:8px; cursor:pointer; padding:4px 8px; border-radius:6px; transition:all .15s; border:none; background:none; font-family:inherit; color:var(--ink); }
.r-btn:hover { background:var(--crimson); color:white; }
.r-btn:hover .r-rec { color:rgba(255,255,255,.75); }
.r-name { font-size:.97rem; font-weight:bold; }
.r-rec { font-size:.72rem; color:var(--ink-light); }

/* ── Rikishi Detail ── */
.hero {
  background:linear-gradient(135deg, var(--crimson-dark), var(--crimson));
  color:white; border-radius:16px; padding:28px; margin-bottom:24px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  box-shadow:0 4px 16px rgba(92,13,13,.3);
}
.hero-icon { width:68px; height:68px; background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.3); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.9rem; flex-shrink:0; }
.hero-info { flex:1; }
.hero-info h2 { font-size:1.75rem; letter-spacing:.05em; }
.hero-info .hero-rank { opacity:.85; margin-top:4px; }
.hero-nums { display:flex; gap:20px; }
.hero-num { text-align:center; }
.hero-num .n { font-size:2.1rem; font-weight:bold; color:var(--gold); line-height:1; }
.hero-num .l { font-size:.72rem; opacity:.8; margin-top:2px; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:16px; margin-bottom:20px; }
.card { background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.06); border:1px solid var(--border); }
.card h3 { font-size:.93rem; color:var(--crimson-dark); margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid var(--paper); letter-spacing:.05em; }

/* Days grid */
.days-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.day-item { text-align:center; }
.day-n { font-size:.62rem; color:var(--ink-light); margin-bottom:2px; }
.day-r { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:bold; margin:0 auto 3px; }
.day-r.win    { background:var(--crimson); color:white; }
.day-r.loss   { background:#34495E; color:white; }
.day-r.absent { background:#95A5A6; color:white; font-size:.68rem; }
.day-r.pending{ background:var(--paper); color:var(--ink-light); border:2px dashed var(--border); }
.day-k { font-size:.52rem; color:var(--ink-light); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40px; }

/* Win rate */
.wr-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.wr-bar { flex:1; height:22px; background:var(--paper); border-radius:11px; overflow:hidden; }
.wr-fill { height:100%; background:linear-gradient(to right,var(--crimson-dark),var(--crimson-light)); border-radius:11px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; color:white; font-size:.73rem; font-weight:bold; transition:width 1s ease; min-width:36px; }
.wr-lbl { font-size:.83rem; color:var(--ink-light); white-space:nowrap; }
.streak-badge { display:inline-block; background:var(--gold); color:var(--crimson-dark); border-radius:20px; padding:4px 14px; font-weight:bold; font-size:.97rem; margin-top:8px; }
.kachi-note { font-size:.83rem; margin-top:12px; color:var(--ink-light); }

/* Prediction panel */
.pred-panel {
  background:linear-gradient(135deg, var(--crimson-dark), var(--crimson));
  color:white; border-radius:16px; padding:22px; margin-bottom:24px;
  box-shadow:0 4px 16px rgba(92,13,13,.3);
}
.pred-panel h3 { font-size:.88rem; opacity:.8; margin-bottom:14px; letter-spacing:.05em; }
.pred-body { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.pred-side { flex:1; min-width:120px; }
.pred-lbl { font-size:.72rem; opacity:.7; margin-bottom:4px; }
.pred-rank { font-size:1.2rem; font-weight:bold; }
.pred-note { font-size:.78rem; opacity:.72; margin-top:6px; line-height:1.5; }
.pred-arrow { font-size:2.2rem; }
.pred-arrow.up   { color:var(--gold); }
.pred-arrow.down { color:rgba(255,255,255,.55); }
.pred-arrow.same { color:rgba(255,255,255,.35); }

/* ── H2H ── */
.h2h-area { background:white; border-radius:12px; padding:20px; margin-bottom:24px; box-shadow:0 2px 8px rgba(0,0,0,.06); border:1px solid var(--border); }
.h2h-area h3 { color:var(--crimson-dark); margin-bottom:14px; font-size:.97rem; }
.h2h-selects { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.h2h-selects select { flex:1; min-width:175px; padding:10px 12px; border:2px solid var(--border); border-radius:8px; font-size:.93rem; background:white; color:var(--ink); font-family:inherit; cursor:pointer; }
.h2h-selects select:focus { outline:none; border-color:var(--crimson); }
.h2h-vs { font-weight:bold; font-size:1.25rem; color:var(--crimson); padding:0 2px; }
.go-btn { background:var(--crimson); color:white; border:none; padding:10px 22px; border-radius:8px; font-size:.93rem; cursor:pointer; font-family:inherit; letter-spacing:.05em; transition:background .2s; white-space:nowrap; }
.go-btn:hover { background:var(--crimson-dark); }

.h2h-score { display:grid; grid-template-columns:1fr auto 1fr; gap:16px; align-items:center; margin-bottom:16px; }
.h2h-fighter { text-align:center; }
.h2h-fighter .fn { font-size:1.25rem; font-weight:bold; color:var(--crimson-dark); margin-bottom:6px; }
.h2h-fighter .fw { font-size:2.8rem; font-weight:bold; color:var(--crimson); line-height:1; }
.h2h-fighter .fp { font-size:.82rem; color:var(--ink-light); margin-top:4px; }
.h2h-mid { text-align:center; }
.h2h-mid .vm { font-size:1.4rem; font-weight:bold; color:var(--ink-light); }
.h2h-mid .vt { font-size:.8rem; color:var(--ink-light); margin-top:4px; }
.h2h-prog { height:8px; background:var(--paper); border-radius:4px; overflow:hidden; margin-bottom:20px; }
.h2h-prog-fill { height:100%; background:var(--crimson); border-radius:4px; transition:width .8s ease; }

.match-list { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); border:1px solid var(--border); overflow:hidden; }
.ml-header { background:var(--crimson-dark); color:white; padding:11px 16px; font-size:.88rem; letter-spacing:.05em; }
.ml-row { display:flex; align-items:center; padding:9px 16px; border-bottom:1px solid var(--paper); gap:10px; font-size:.88rem; }
.ml-row:last-child { border-bottom:none; }
.ml-row:hover { background:#fff5f5; }
.ml-basho { color:var(--ink-light); font-size:.78rem; min-width:88px; }
.ml-winner { font-weight:bold; color:var(--crimson); flex:1; }
.ml-loser { color:var(--ink-light); flex:1; }
.ml-kimarite { color:var(--ink-light); font-size:.78rem; min-width:72px; text-align:right; }

.empty-state { text-align:center; padding:48px; color:var(--ink-light); }
.empty-state .ei { font-size:2.8rem; margin-bottom:12px; }

@media (max-width:600px) {
  .banzuke-table td.center { width:68px; font-size:.7rem; }
  .r-name { font-size:.88rem; }
  .r-rec { display:none; }
  .hero-nums { gap:12px; }
  .hero-num .n { font-size:1.75rem; }
} 
</style>
</head>
<body>

<header class="site-header">
  <h1>大相撲分析<span>SUMO ANALYTICS</span></h1>
  <div class="basho-badge" id="basho-badge">読み込み中…</div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active"  onclick="switchTab(0)">📋 幕内番付</button>
  <button class="tab-btn"        onclick="switchTab(1)">🔍 力士詳細</button>
  <button class="tab-btn"        onclick="switchTab(2)">⚔️ 対戦比較</button>
</nav>

<!-- Tab 0: Banzuke -->
<div id="tab-0" class="tab-content active">
  <div class="content-area">
    <div id="banzuke-wrap">
      <div class="loading-box"><div class="spinner"></div><p>番付データを取得中…</p></div>
    </div>
  </div>
</div>

<!-- Tab 1: Detail -->
<div id="tab-1" class="tab-content">
  <div class="content-area">
    <div id="detail-wrap">
      <div class="empty-state"><div class="ei">🏆</div><p>番付の力士名をクリックしてください</p></div>
    </div>
  </div>
</div>

<!-- Tab 2: H2H -->
<div id="tab-2" class="tab-content">
  <div class="content-area">
    <div class="h2h-area">
      <h3>直接対決 比較</h3>
      <div class="h2h-selects">
        <select id="sel1"><option value="">力士を選択…</option></select>
        <span class="h2h-vs">VS</span>
        <select id="sel2"><option value="">力士を選択…</option></select>
        <button class="go-btn" onclick="fetchH2H()">比較する</button>
      </div>
    </div>
    <div id="h2h-wrap">
      <div class="empty-state"><div class="ei">⚔️</div><p>2人の力士を選んで比較してください</p></div>
    </div>
  </div>
</div>

<script>
const BASE = 'https://www.sumo-api.com';

const RANK_JP = { Yokozuna:'横綱', Ozeki:'大関', Sekiwake:'関脇', Komusubi:'小結', Maegashira:'前頭', Juryo:'十両' };
const SIDE_JP = { East:'東', West:'西' };
const BASHO_NAMES = {1:'初場所',3:'春場所',5:'夏場所',7:'名古屋場所',9:'秋場所',11:'九州場所'};
const KIMARITE_JP = {
  yorikiri:'寄り切り', oshidashi:'押し出し', hatakikomi:'叩き込み',
  uwatenage:'上手投げ', shitatenage:'下手投げ', tsukiotoshi:'突き落とし',
  okuridashi:'送り出し', tsukidashi:'突き出し', sukuinage:'掬い投げ',
  kotenage:'小手投げ', sotogake:'外掛け', uchigake:'内掛け',
  yoritaoshi:'寄り倒し', oshitaoshi:'押し倒し', tsukitaoshi:'突き倒し',
  abisetaoshi:'浴びせ倒し', tsuridashi:'釣り出し', kakenage:'掛け投げ',
  kainahineri:'掻い捻り', ipponzeoi:'一本背負い', uwatedashinage:'上手出し投げ',
  shitatedashinage:'下手出し投げ', nichonage:'二丁投げ', sototasukizori:'外たすき反り',
  kimedashi:'極め出し', kimemawarashi:'極め回し', okuritaoshi:'送り倒し',
  fusen:'不戦',
};

// ── State ──────────────────────────────────────────────────
let rikishiStore = {};  // id → rikishi obj with record
let banzukeEast = [], banzukeWest = [];
let currentBashoId = '';
let kimariteChart = null;

// ── Utilities ──────────────────────────────────────────────
function getCurrentBashoId() {
  const d = new Date(), y = d.getFullYear(), m = d.getMonth()+1;
  let bm = 1;
  for (const x of [1,3,5,7,9,11]) { if (m >= x) bm = x; }
  return `${y}${String(bm).padStart(2,'0')}`;
}
function prevBashoId(id) {
  let y = +id.slice(0,4), m = +id.slice(4,6);
  m -= 2; if (m <= 0) { m += 12; y--; }
  return `${y}${String(m).padStart(2,'0')}`;
}
function bashoToJP(id) {
  if (!id || id.length < 6) return id;
  return `${id.slice(0,4)}年${BASHO_NAMES[+id.slice(4,6)] || id.slice(4,6)+'月場所'}`;
}
function parseRank(s) {
  if (!s) return { type:'Maegashira', number:1, side:'East' };
  const p = s.split(' ');
  return { type:p[0]||'Maegashira', number:parseInt(p[1])||1, side:p[2]||'East' };
}
function fmtRankJP(s) {
  const {type,number,side} = parseRank(s);
  const t = RANK_JP[type]||type, si = SIDE_JP[side]||side;
  return ['Yokozuna','Ozeki','Sekiwake','Komusubi'].includes(type) ? `${t}${si}` : `${t}${number}${si}`;
}
function fmtRankCenter(s) {
  const {type,number} = parseRank(s);
  const t = RANK_JP[type]||type;
  return ['Yokozuna','Ozeki','Sekiwake','Komusubi'].includes(type) ? t : `${t}${number}`;
}
function recStr(w,l,a) { return `${w}勝${l}敗${a>0?a+'休':''}`; }
function kjp(k) { return KIMARITE_JP[k]||k||''; }

function switchTab(n) {
  document.querySelectorAll('.tab-content').forEach((el,i) => el.classList.toggle('active', i===n));
  document.querySelectorAll('.tab-btn').forEach((el,i) => el.classList.toggle('active', i===n));
}

// ── Fetch Banzuke ──────────────────────────────────────────
async function loadBanzuke() {
  const tries = [getCurrentBashoId()];
  let id = tries[0];
  for (let i=0;i<3;i++) { id=prevBashoId(id); tries.push(id); }

  for (const bid of tries) {
    try {
      const res = await fetch(`${BASE}/api/basho/${bid}/banzuke/Makuuchi`);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.east?.length > 0) {
        currentBashoId = bid;
        return data;
      }
    } catch(_) {}
  }
  throw new Error('番付取得失敗');
}

// ── Render Banzuke ─────────────────────────────────────────
function renderBanzuke(data) {
  banzukeEast = data.east || [];
  banzukeWest = data.west || [];
  const all = [...banzukeEast, ...banzukeWest];
  all.forEach(r => { rikishiStore[r.rikishiID] = r; });

  document.getElementById('basho-badge').textContent = bashoToJP(currentBashoId);

  const maxLen = Math.max(banzukeEast.length, banzukeWest.length);
  let rows = '';
  for (let i=0; i<maxLen; i++) {
    const e = banzukeEast[i], w = banzukeWest[i];
    const ref = e||w;
    const rtype = parseRank(ref.rank).type;
    const center = fmtRankCenter(ref.rank);

    const makeBtn = (r, side) => {
      if (!r) return '';
      const rec = recStr(r.wins,r.losses,r.absences);
      return side==='east'
        ? `<button class="r-btn" onclick="showDetail(${r.rikishiID})"><span class="r-rec">${rec}</span><span class="r-name">${r.shikonaEn}</span></button>`
        : `<button class="r-btn" onclick="showDetail(${r.rikishiID})"><span class="r-name">${r.shikonaEn}</span><span class="r-rec">${rec}</span></button>`;
    };

    rows += `<tr class="tr-${rtype.toLowerCase()}">
      <td class="east-cell">${makeBtn(e,'east')}</td>
      <td class="center">${center}</td>
      <td class="west-cell">${makeBtn(w,'west')}</td>
    </tr>`;
  }

  document.getElementById('banzuke-wrap').innerHTML = `
    <div class="banzuke-title">
      <h2>幕内番付</h2>
      <p>${bashoToJP(currentBashoId)}</p>
    </div>
    <table class="banzuke-table">
      <thead><tr>
        <th style="text-align:right;padding:8px 10px;color:var(--crimson-dark);background:var(--paper)">東（EAST）</th>
        <th style="text-align:center;background:var(--crimson-dark);color:white;padding:8px">番　付</th>
        <th style="text-align:left;padding:8px 10px;color:var(--crimson-dark);background:var(--paper)">西（WEST）</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  populateSelects();
}

// ── Show Detail ────────────────────────────────────────────
function showDetail(rid) {
  const r = rikishiStore[rid];
  if (!r) return;
  switchTab(1);
  renderDetail(r);
}

function renderDetail(r) {
  const rec = r.record || [];
  const wins = r.wins||0, losses = r.losses||0, absences = r.absences||0;
  const total = wins+losses;
  const wr = total>0 ? Math.round(wins/total*100) : 0;

  // Longest consecutive-win streak
  let maxStreak=0, curStreak=0;
  for (const m of rec) {
    if (m.result==='win'||m.result==='fusen win') { curStreak++; maxStreak=Math.max(maxStreak,curStreak); }
    else curStreak=0;
  }

  // Kimarite counts (wins only)
  const km = {};
  for (const m of rec) {
    if ((m.result==='win'||m.result==='fusen win') && m.kimarite)
      km[m.kimarite] = (km[m.kimarite]||0)+1;
  }

  // 15-day grid
  let daysHtml = '';
  for (let d=0; d<15; d++) {
    const m = rec[d];
    let cls='pending', txt='-', kt='';
    if (m) {
      if      (m.result==='win'||m.result==='fusen win')  { cls='win';  txt='勝'; }
      else if (m.result==='loss'||m.result==='fusen loss') { cls='loss'; txt='負'; }
      else if (m.result==='absent')                        { cls='absent'; txt='休'; }
      kt = kjp(m.kimarite);
    }
    daysHtml += `<div class="day-item"><div class="day-n">${d+1}日目</div><div class="day-r ${cls}">${txt}</div><div class="day-k">${kt}</div></div>`;
  }

  // Prediction
  const pred = predictRank(r.rank, wins, losses, total);

  // Win/loss note
  const kachiNote = wins>=8 ? '✅ 勝ち越し確定' : losses>=8 ? '❌ 負け越し確定' : `あと${8-wins}勝で勝ち越し`;

  document.getElementById('detail-wrap').innerHTML = `
    <div class="hero">
      <div class="hero-icon">🏆</div>
      <div class="hero-info">
        <h2>${r.shikonaEn}</h2>
        <div class="hero-rank">${fmtRankJP(r.rank)}</div>
      </div>
      <div class="hero-nums">
        <div class="hero-num"><div class="n">${wins}</div><div class="l">勝</div></div>
        <div class="hero-num"><div class="n" style="color:rgba(255,255,255,.65)">${losses}</div><div class="l">敗</div></div>
        ${absences>0?`<div class="hero-num"><div class="n" style="color:rgba(255,255,255,.45)">${absences}</div><div class="l">休</div></div>`:''}
      </div>
    </div>

    <div class="pred-panel">
      <h3>📊 次場所番付予測</h3>
      <div class="pred-body">
        <div class="pred-side">
          <div class="pred-lbl">現在の番付</div>
          <div class="pred-rank">${fmtRankJP(r.rank)}</div>
        </div>
        <div class="pred-arrow ${pred.dir}">${pred.dir==='up'?'↑':pred.dir==='down'?'↓':'→'}</div>
        <div class="pred-side">
          <div class="pred-lbl">予測番付</div>
          <div class="pred-rank">${pred.display}</div>
          <div class="pred-note">${pred.note}</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card">
        <h3>📅 今場所の取組（${total}番）</h3>
        <div class="days-grid">${daysHtml}</div>
      </div>

      <div class="card">
        <h3>📈 勝率・連勝記録</h3>
        <div class="wr-row">
          <div class="wr-bar"><div class="wr-fill" style="width:${wr}%">${wr}%</div></div>
          <div class="wr-lbl">${wr}%</div>
        </div>
        <p style="font-size:.82rem;color:var(--ink-light)">${wins}勝 / ${total}番</p>
        <div style="margin-top:14px">
          <p style="font-size:.82rem;color:var(--ink-light)">最長連勝（今場所）</p>
          <div class="streak-badge">${maxStreak}連勝</div>
        </div>
        <p class="kachi-note">${kachiNote}</p>
      </div>

      <div class="card">
        <h3>🥋 決まり手の内訳</h3>
        ${Object.keys(km).length>0
          ? '<canvas id="km-chart" height="230"></canvas>'
          : '<p style="color:var(--ink-light);text-align:center;padding:24px 0">データなし</p>'}
      </div>
    </div>`;

  // Kimarite chart
  if (Object.keys(km).length>0) {
    if (kimariteChart) kimariteChart.destroy();
    const ctx = document.getElementById('km-chart').getContext('2d');
    const labels = Object.keys(km).map(k=>kjp(k)||k);
    const vals   = Object.values(km);
    const colors = ['#8B1A1A','#B22222','#CD5C5C','#C8961E','#DAA520','#5C0D0D','#A0522D','#8B4513','#D2691E','#CC7722','#7A5C4E','#556B2F'];
    kimariteChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets:[{ data:vals, backgroundColor:colors.slice(0,labels.length), borderWidth:2, borderColor:'white' }] },
      options: { plugins:{ legend:{ position:'right', labels:{ font:{size:11}, boxWidth:14 } }, cutout:'55%' }
    });
  }
}

// ── Rank Prediction ────────────────────────────────────────
const RANK_CAPS = [
  {type:'Yokozuna',  max:4},
  {type:'Ozeki',     max:6},
  {type:'Sekiwake',  max:4},
  {type:'Komusubi',  max:4},
  {type:'Maegashira',max:34},
];
function rankToPos(s) {
  const {type,number,side} = parseRank(s);
  let pos=0;
  for (const r of RANK_CAPS) {
    if (r.type===type) { return pos + (number-1)*2 + (side==='East'?0:1); }
    pos += r.max;
  }
  return pos;
}
function posToRank(pos) {
  let rem = Math.max(0, pos);
  for (const r of RANK_CAPS) {
    if (rem < r.max) {
      return `${r.type} ${Math.floor(rem/2)+1} ${rem%2===0?'East':'West'}`;
    }
    rem -= r.max;
  }
  return 'Juryo 1 East';
}

function predictRank(rankStr, wins, losses, total) {
  if (total===0) return { display: fmtRankJP(rankStr), dir:'same', note:'未対戦' };
  const {type} = parseRank(rankStr);

  if (type==='Yokozuna') {
    return { display:'横綱', dir:'same', note: wins<8?'横綱は降格なし（引退が慣例）':'横綱維持' };
  }
  if (type==='Ozeki') {
    if (wins<8) return { display:'大関（カド番）', dir:'down', note:'次場所8勝以上で大関復帰' };
    if (wins>=11) return { display:'大関', dir:'same', note:'大関維持（横綱昇進の可能性）' };
    return { display:'大関', dir:'same', note:'大関維持' };
  }

  const cur = rankToPos(rankStr);
  let change = 0;
  if (wins>=8) {
    // kachikoshi: rise by wins-7 (the more decisive the win, the bigger the rise)
    change = -(wins - 7);
    if (wins>=13) change -= 2;
  } else {
    // makekoshi: fall faster
    change = Math.round((8 - wins) * 1.6);
  }

  let newPos = Math.round(cur + change);
  newPos = Math.max(0, newPos);

  const totalMak = RANK_CAPS.reduce((s,r)=>s+r.max,0);
  if (newPos >= totalMak) {
    return { display:'十両降格の可能性', dir:'down', note:`${wins}勝${losses}敗（負け越し）` };
  }

  const newRank = posToRank(newPos);
  const dir = newPos<cur?'up':newPos>cur?'down':'same';
  const slots = Math.abs(Math.round(cur-newPos));
  const note = wins>=8
    ? `${wins}勝${losses}敗（勝ち越し）→ 約${slots}枚上昇`
    : `${wins}勝${losses}敗（負け越し）→ 約${slots}枚降下`;

  return { display: fmtRankJP(newRank), dir, note };
}

// ── H2H Selects ───────────────────────────────────────────
function populateSelects() {
  const all = [...banzukeEast, ...banzukeWest]
    .sort((a,b) => (a.rankValue||0)-(b.rankValue||0));
  const opts = '<option value="">力士を選択…</option>' +
    all.map(r=>`<option value="${r.rikishiID}">${r.shikonaEn}（${fmtRankJP(r.rank)}）</option>`).join('');
  document.getElementById('sel1').innerHTML = opts;
  document.getElementById('sel2').innerHTML = opts;
}

async function fetchH2H() {
  const s1=document.getElementById('sel1'), s2=document.getElementById('sel2');
  const id1=s1.value, id2=s2.value;
  if (!id1||!id2)     { alert('2人の力士を選択してください'); return; }
  if (id1===id2)      { alert('異なる力士を選択してください'); return; }
  const name1 = s1.options[s1.selectedIndex].text.split('（')[0];
  const name2 = s2.options[s2.selectedIndex].text.split('（')[0];

  const wrap = document.getElementById('h2h-wrap');
  wrap.innerHTML = '<div class="loading-box"><div class="spinner"></div><p>対戦データを取得中…</p></div>';

  try {
    const res = await fetch(`${BASE}/api/rikishi/${id1}/matches/${id2}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderH2H(data, name1, name2, id1);
  } catch(_) {
    wrap.innerHTML = '<div class="error-box">対戦データの取得に失敗しました。しばらくして再試行してください。</div>';
  }
}

function renderH2H(matches, name1, name2, id1) {
  const wrap = document.getElementById('h2h-wrap');
  if (!matches||matches.length===0) {
    wrap.innerHTML = '<div class="empty-state"><div class="ei">🔍</div><p>対戦記録がありません</p></div>';
    return;
  }

  // matches[] are from id1's perspective: result='win' means id1 won
  const wins1 = matches.filter(m=>m.result==='win'||m.result==='fusen win').length;
  const wins2 = matches.length - wins1;
  const total  = matches.length;
  const pct1   = total>0 ? Math.round(wins1/total*100) : 0;

  const rows = [...matches].reverse().map(m => {
    const id1won = m.result==='win'||m.result==='fusen win';
    return `<div class="ml-row">
      <div class="ml-basho">${bashoToJP(m.bashoId||'')}</div>
      <div class="ml-winner">🏆 ${id1won?name1:name2}</div>
      <div class="ml-loser">${id1won?name2:name1}</div>
      <div class="ml-kimarite">${kjp(m.kimarite)}</div>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="h2h-score">
      <div class="h2h-fighter">
        <div class="fn">${name1}</div>
        <div class="fw">${wins1}</div>
        <div class="fp">勝率 ${pct1}%</div>
      </div>
      <div class="h2h-mid">
        <div class="vm">対戦</div>
        <div class="vt">通算 ${total}番</div>
      </div>
      <div class="h2h-fighter">
        <div class="fn">${name2}</div>
        <div class="fw">${wins2}</div>
        <div class="fp">勝率 ${100-pct1}%</div>
      </div>
    </div>
    <div class="h2h-prog"><div class="h2h-prog-fill" style="width:${pct1}%"></div></div>
    <div class="match-list">
      <div class="ml-header">対戦履歴（新しい順）　全 ${total} 番</div>
      ${rows}
    </div>`;
}

// ── Init ───────────────────────────────────────────────────
(async () => {
  try {
    const data = await loadBanzuke();
    renderBanzuke(data);
  } catch(e) {
    document.getElementById('banzuke-wrap').innerHTML =
      '<div class="error-box">番付データの取得に失敗しました。ページを再読み込みしてください。</div>';
    document.getElementById('basho-badge').textContent = 'データなし';
  }
})();
</script>
