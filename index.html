<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag-Only Banzuke Prediction App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the Sumo Banzuke Prediction App</h1>
    <p>Use drag and drop to organize the banzuke predictions.</p>
    <div id="prediction-container">
        <div class="prediction-item" draggable="true">Prediction 1</div>
        <div class="prediction-item" draggable="true">Prediction 2</div>
        <div class="prediction-item" draggable="true">Prediction 3</div>
        <div class="prediction-item" draggable="true">Prediction 4</div>
        <div class="prediction-item" draggable="true">Prediction 5</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
