<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大相撲番付予想</title>
  <style>
    :root {
      --paper: #f7edd8;
      --paper-dark: #eddfc0;
      --red: #8b0000;
      --red-light: #a00000;
      --gold: #b8860b;
      --gold-light: #daa520;
      --text: #1a0a00;
      --text-muted: #6b4c2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "游明朝", "YuMincho", "ヒラギノ明朝 ProN W3", "HiraMinProN-W3",
                   "MS Mincho", "MS 明朝", Georgia, serif;
      background: #1c0a04;
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(0deg,  rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px);
      min-height: 100vh;
      padding: 14px;
      color: var(--text);
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      background: linear-gradient(160deg, #700000 0%, #4a0000 100%);
      border: 3px double var(--gold);
      padding: 14px 20px 12px;
      margin-bottom: 12px;
      color: var(--paper);
      position: relative;
    }
    .header::before,
    .header::after {
      content: "◆";
      position: absolute;
      top: 50%; transform: translateY(-50%);
      color: var(--gold-light);
      font-size: 1rem;
    }
    .header::before { left: 12px; }
    .header::after  { right: 12px; }
    .header h1 {
      font-size: 1.75rem;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.6);
    }
    .basho-info {
      font-size: 0.85rem;
      color: var(--gold-light);
      margin-top: 4px;
      letter-spacing: 0.25em;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      font-family: inherit;
      font-size: 0.88rem;
      padding: 7px 18px;
      border: 2px solid var(--gold);
      background: var(--red);
      color: var(--paper);
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover  { background: var(--red-light); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.sub {
      background: #2c1208;
      border-color: #665533;
      color: #cca;
    }
    button.sub:hover { background: #3c1a0a; }

    /* ── Status messages ── */
    .loading {
      text-align: center;
      color: var(--gold-light);
      font-size: 1rem;
      padding: 50px 0;
      letter-spacing: 0.2em;
    }
    .loading-dots::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "・"; }
      50%  { content: "・・"; }
      75%  { content: "・・・"; }
      100% { content: ""; }
    }
    .error-msg {
      text-align: center;
      color: #ff8888;
      background: rgba(139,0,0,0.25);
      border: 1px solid #8b0000;
      padding: 12px 16px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .saved-notice {
      text-align: center;
      color: var(--gold-light);
      font-size: 0.78rem;
      margin-bottom: 6px;
      min-height: 1.2em;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .saved-notice.show { opacity: 1; }

    /* ── Banzuke frame ── */
    .banzuke-wrap {
      background: var(--paper);
      background-image:
        radial-gradient(ellipse at 15% 40%, rgba(184,134,11,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 60%, rgba(139,0,0,0.05) 0%, transparent 55%);
      border: 4px double var(--red);
      box-shadow: 0 0 0 1px var(--gold), 0 0 30px rgba(0,0,0,0.7);
      padding: 10px 10px 14px;
    }

    .banzuke-scroll { overflow-x: auto; }
    .banzuke-inner  { min-width: 420px; }

    /* ── Division header ── */
    .div-header {
      text-align: center;
      background: linear-gradient(90deg, transparent, var(--red) 20%, var(--red) 80%, transparent);
      color: var(--paper);
      font-size: 1rem;
      letter-spacing: 0.6em;
      text-indent: 0.6em;
      padding: 5px 10px;
      margin: 10px 0 6px;
      border-top: 1px solid var(--gold);
      border-bottom: 1px solid var(--gold);
    }
    .div-header:first-child { margin-top: 0; }

    /* ── Column labels (東/西) ── */
    .col-labels {
      display: grid;
      grid-template-columns: 1fr 68px 1fr;
      gap: 3px;
      margin-bottom: 3px;
    }
    .col-label {
      text-align: center;
      font-size: 1.05rem;
      color: var(--red);
      letter-spacing: 0.4em;
      padding: 2px 0;
    }

    /* ── Banzuke row ── */
    .banzuke-row {
      display: grid;
      grid-template-columns: 1fr 68px 1fr;
      gap: 3px;
      margin-bottom: 3px;
      align-items: stretch;
    }

    /* ── Rank center ── */
    .rank-center {
      background: var(--red);
      color: var(--paper);
      font-size: 0.72rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3px 2px;
      min-height: 82px;
      border: 1px solid var(--gold);
      line-height: 1.5;
      letter-spacing: 0.05em;
      white-space: pre-line;
      user-select: none;
    }
    .rank-center.rank-yokozuna { font-size: 0.85rem; font-weight: bold; }
    .rank-center.rank-ozeki    { font-size: 0.82rem; }

    /* ── Wrestler slot ── */
    .slot {
      background: var(--paper);
      border: 1px solid var(--gold);
      padding: 5px 7px;
      cursor: grab;
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s, box-shadow 0.12s, opacity 0.12s;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
    }
    .slot:active { cursor: grabbing; }
    .slot.east { text-align: right; }
    .slot.west { text-align: left; }
    /* empty = その番付位置が存在しないセル（ドロップ不可）*/
    .slot.empty {
      background: rgba(139,0,0,0.03);
      border-style: dashed;
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }
    /* vacant = 空き予想スロット（ドロップ可）*/
    .slot.vacant {
      background: rgba(139,0,0,0.04);
      border-style: dashed;
      border-color: #bba070;
      cursor: default;
      justify-content: center;
      align-items: center;
    }
    .slot.vacant .vacant-hint {
      color: #c0a060;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }
    .slot:not(.empty):not(.vacant):hover {
      background: #fff8e8;
      border-color: var(--red);
      z-index: 2;
    }
    .slot.drag-over {
      background: #fff3cc !important;
      border: 2px solid var(--gold-light) !important;
      box-shadow: 0 0 10px rgba(218,165,32,0.55);
    }
    .slot.dragging {
      opacity: 0.35;
      box-shadow: none;
    }

    /* Yokozuna / Ozeki rows slightly taller */
    .banzuke-row.row-yokozuna .slot,
    .banzuke-row.row-ozeki    .slot { min-height: 88px; }

    /* ── Wrestler card content ── */
    .shikona {
      font-size: 0.92rem;
      font-weight: bold;
      color: var(--text);
      line-height: 1.2;
    }
    .banzuke-row.row-yokozuna .shikona { font-size: 1.02rem; }
    .banzuke-row.row-ozeki    .shikona { font-size: 0.98rem; }
    .prev-rank {
      font-size: 0.62rem;
      color: var(--red);
      margin-top: 1px;
      letter-spacing: 0.03em;
    }
    .match-dots {
      font-size: 0.6rem;
      letter-spacing: 0.02em;
      margin-top: 2px;
      line-height: 1.3;
      word-break: break-all;
    }
    .match-dots .w { color: #8b0000; }
    .match-dots .l { color: #444; }
    .match-dots .a { color: #999; }
    .record {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Touch ghost ── */
    .touch-ghost {
      position: fixed !important;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.72;
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      border: 2px solid var(--gold-light) !important;
    }

    /* ── Slot row controls ── */
    .slot-controls {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      margin: 0 0 8px;
      padding: 0 2px;
    }
    .btn-slot {
      font-family: inherit;
      font-size: 0.7rem;
      padding: 3px 10px;
      border: 1px solid #aa8850;
      background: rgba(139,0,0,0.07);
      color: #7a4e20;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.1s, transform 0.1s;
    }
    .btn-slot:hover { background: rgba(139,0,0,0.15); transform: translateY(-1px); }
    .btn-slot:active { transform: translateY(0); }

    /* ── History panel ── */
    .history-panel {
      background: var(--paper);
      border: 3px double var(--red);
      box-shadow: 0 0 0 1px var(--gold), 0 4px 20px rgba(0,0,0,0.5);
      margin-top: 12px;
      display: none;
    }
    .history-panel.open { display: block; }
    .history-panel-header {
      background: linear-gradient(90deg, var(--red) 0%, #600000 100%);
      color: var(--paper);
      padding: 9px 14px;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--gold);
    }
    .history-close-btn {
      background: transparent !important;
      border: 1px solid rgba(255,255,255,0.4) !important;
      color: var(--paper) !important;
      padding: 2px 8px !important;
      font-size: 0.8rem !important;
      cursor: pointer;
    }
    .history-close-btn:hover { background: rgba(255,255,255,0.15) !important; transform: none !important; }
    .history-list { padding: 6px 10px 10px; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 10px;
      border-bottom: 1px solid var(--paper-dark);
    }
    .history-item:last-child { border-bottom: none; }
    .history-item-name {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--text);
      letter-spacing: 0.1em;
    }
    .history-item-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .history-item-actions { display: flex; gap: 6px; }
    .restore-btn {
      font-size: 0.78rem !important;
      padding: 4px 12px !important;
      border: 1px solid var(--gold) !important;
      background: var(--red) !important;
      color: var(--paper) !important;
      letter-spacing: 0.1em;
    }
    .restore-btn:hover { background: var(--red-light) !important; }
    .delete-ver-btn {
      font-size: 0.78rem !important;
      padding: 4px 10px !important;
      border: 1px solid #665533 !important;
      background: #2c1208 !important;
      color: #cca !important;
    }
    .delete-ver-btn:hover { background: #3c1a0a !important; }
    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 24px;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: #7a5535;
      font-size: 0.72rem;
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .header h1    { font-size: 1.25rem; letter-spacing: 0.35em; }
      .banzuke-row,
      .col-labels   { grid-template-columns: 1fr 50px 1fr; }
      .rank-center  { font-size: 0.62rem; min-height: 70px; }
      .slot         { min-height: 70px; padding: 4px 5px; }
      .shikona      { font-size: 0.78rem; }
      .prev-rank    { font-size: 0.56rem; }
      .match-dots   { font-size: 0.52rem; }
      .record       { font-size: 0.56rem; }
      .btn-slot     { font-size: 0.62rem; padding: 2px 7px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>大相撲番付予想</h1>
    <div class="basho-info" id="bashoInfo">読み込み中…</div>
  </div>

  <div class="controls">
    <button onclick="resetBanzuke()">番付リセット</button>
    <button onclick="saveVersion()">この番付を保存</button>
    <button class="sub" onclick="toggleHistory()">保存履歴</button>
    <button class="sub" onclick="refreshData()">データ更新</button>
  </div>

  <div class="saved-notice" id="savedNotice"></div>
  <div class="error-msg"  id="errorMsg"   style="display:none;"></div>

  <div class="loading" id="loadingMsg">
    <span class="loading-dots">番付データを取得中</span>
  </div>

  <div id="banzukeWrap" class="banzuke-wrap" style="display:none;">
    <div class="banzuke-scroll">
      <div class="banzuke-inner" id="banzukeInner"></div>
    </div>
  </div>

  <div class="history-panel" id="historyPanel">
    <div class="history-panel-header">
      <span>保存履歴</span>
      <button class="history-close-btn" onclick="toggleHistory()">✕ 閉じる</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="footer">
    データ提供: sumo-api.com ／ 力士カードをドラッグして次場所の予想番付を作れます
  </div>
</div>

<script>
/* ================================================================
   定数
================================================================ */
const API        = 'https://www.sumo-api.com/api';
const SAVE_KEY   = 'sumo_banzuke_v1';
const HISTORY_KEY = 'sumo_history_v1';
const BASHO_HIST_KEY = 'sumo_hist_basho';

const RANK_ORDER = { Yokozuna: 0, Ozeki: 1, Sekiwake: 2, Komusubi: 3, Maegashira: 4 };
const RANK_JP    = {
  Yokozuna: '横綱', Ozeki: '大関', Sekiwake: '関脇',
  Komusubi: '小結', Maegashira: '前頭', Juryo: '十両', Makushita: '幕下'
};
const DIV_JP = { Makuuchi: '幕内', Juryo: '十両', Makushita: '幕下上位' };
const NAMED_RANKS = new Set(['Yokozuna', 'Ozeki', 'Sekiwake', 'Komusubi']);
const JP_NUM = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十',
               '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十'];
const BASHO_MONTHS = [1, 3, 5, 7, 9, 11];
const VENUES = {1:'初場所（東京）', 3:'春場所（大阪）', 5:'夏場所（東京）',
                7:'名古屋場所', 9:'秋場所（東京）', 11:'九州場所（福岡）'};

/* ================================================================
   状態
================================================================ */
let slots      = [];   // [{key, rankName, rankNumber, side, division, userAdded?}]
let baseline   = {};   // key → wrestler  (API から取得した初期値)
let assignment = {};   // key → wrestler  (現在の予想配置)
let bashoId    = null;

/* ユーザーが追加したスロットのキー集合 */
let userAddedSlots = new Set();

/* ドラッグ状態 */
let dragSrc    = null;
let touchSrc   = null;
let touchGhost = null;
let touchRect  = null;

/* ================================================================
   ユーティリティ
================================================================ */
function parseRank(s) {
  const p = s.trim().split(/\s+/);
  const name   = p[0];
  const number = (p.length >= 2 && p[1] !== 'East' && p[1] !== 'West') ? (parseInt(p[1]) || 1) : 1;
  const side   = p.find(x => x === 'East' || x === 'West') || 'East';
  return { name, number, side };
}

function slotKey(div, rankName, rankNumber, side) {
  return `${div}|${rankName}|${rankNumber}|${side}`;
}

function rankLabel(rankName, rankNumber) {
  const jp = RANK_JP[rankName] || rankName;
  if (NAMED_RANKS.has(rankName)) return jp;
  const n = JP_NUM[rankNumber] || String(rankNumber);
  return jp + '\n' + n + '枚目';
}

function rankCssClass(rankName) {
  return 'rank-' + rankName.toLowerCase();
}

function rankLabelFull(rankStr) {
  if (!rankStr) return '';
  const p = parseRank(rankStr);
  const jp = RANK_JP[p.name] || p.name;
  const sideJp = p.side === 'East' ? '東' : '西';
  if (NAMED_RANKS.has(p.name)) return jp + ' ' + sideJp;
  const n = JP_NUM[p.number] || String(p.number);
  return jp + n + '枚目 ' + sideJp;
}

function matchDotsHtml(record) {
  if (!record || !record.length) return '';
  return record.map(r => {
    if (r.result === 'win')  return '<span class="w">○</span>';
    if (r.result === 'loss') return '<span class="l">●</span>';
    return '<span class="a">×</span>';
  }).join('');
}

function formatRecord(w, l, a) {
  if (w == null) return '';
  let s = `${w}勝${l}敗`;
  if (a > 0) s += `${a}休`;
  return s;
}

function bashoLabel(id) {
  if (!id) return '';
  const y = id.slice(0, 4);
  const m = parseInt(id.slice(4));
  return `${y}年 ${VENUES[m] || m + '月場所'}`;
}

function rowOrder(rankName, rankNumber, div) {
  if (div === 'Makuuchi') return (RANK_ORDER[rankName] ?? 9) * 100 + rankNumber;
  return rankNumber;
}

/* ================================================================
   API
================================================================ */
async function apiFetch(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${path}`);
  return res.json();
}

async function findLatestBasho() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth() + 1;
  const ids   = [];
  for (let y = year; y >= year - 1; y--) {
    const ms = [...BASHO_MONTHS].filter(m => y < year || m <= month).reverse();
    ms.forEach(m => ids.push(`${y}${String(m).padStart(2, '0')}`));
  }
  for (const id of ids) {
    try {
      const d = await apiFetch(`/basho/${id}/banzuke/Makuuchi`);
      if (d?.east?.length || d?.west?.length) return id;
    } catch (_) { /* try next */ }
  }
  return null;
}

/* ================================================================
   データ読み込み
================================================================ */
async function loadData() {
  showLoading(true);
  hideError();
  document.getElementById('banzukeWrap').style.display = 'none';
  document.getElementById('historyPanel').classList.remove('open');

  try {
    bashoId = await findLatestBasho();
    if (!bashoId) throw new Error('番付データが見つかりませんでした。しばらくして再度お試しください。');

    document.getElementById('bashoInfo').textContent = bashoLabel(bashoId);

    const [maku, juro, maks] = await Promise.all([
      apiFetch(`/basho/${bashoId}/banzuke/Makuuchi`),
      apiFetch(`/basho/${bashoId}/banzuke/Juryo`),
      apiFetch(`/basho/${bashoId}/banzuke/Makushita`).catch(() => ({ east: [], west: [] }))
    ]);

    slots          = [];
    baseline       = {};
    userAddedSlots = new Set();

    function ingest(data, div, maxRankNum) {
      const wrestlers = [...(data.east || []), ...(data.west || [])];
      wrestlers.forEach(w => {
        const p = parseRank(w.rank);
        if (maxRankNum && p.number > maxRankNum) return;
        const key = slotKey(div, p.name, p.number, p.side);
        baseline[key] = {
          shikonaJp:    w.shikonaJp || w.shikonaEn || '（不明）',
          wins:         w.wins      ?? 0,
          losses:       w.losses    ?? 0,
          absences:     w.absences  ?? 0,
          originalRank: w.rank      || '',
          record:       w.record    || []
        };
        slots.push({ key, rankName: p.name, rankNumber: p.number, side: p.side, division: div });
      });
    }

    ingest(maku, 'Makuuchi');
    ingest(juro, 'Juryo');
    ingest(maks, 'Makushita', 15);

    const saved = loadSaved();
    if (saved && validate(saved)) {
      assignment = saved;
    } else {
      assignment = { ...baseline };
    }

    render();
    showLoading(false);
    document.getElementById('banzukeWrap').style.display = 'block';

  } catch (err) {
    showLoading(false);
    showError(err.message);
  }
}

/* ================================================================
   スロット行の追加・削除
================================================================ */
function addRankRow(rankName) {
  const div = 'Makuuchi';
  const maxNum = slots
    .filter(s => s.division === div && s.rankName === rankName)
    .reduce((m, s) => Math.max(m, s.rankNumber), 0);

  const newNum = (maxNum || 0) + 1;
  for (const side of ['East', 'West']) {
    const key = slotKey(div, rankName, newNum, side);
    if (!slots.some(s => s.key === key)) {
      slots.push({ key, rankName, rankNumber: newNum, side, division: div, userAdded: true });
      baseline[key]    = null;
      assignment[key]  = null;
      userAddedSlots.add(key);
    }
  }
  saveAssignment();
  render();
}

function removeRankRow(rankName) {
  const div = 'Makuuchi';
  const rankSlots = slots.filter(s => s.division === div && s.rankName === rankName);
  const maxNum = rankSlots.reduce((m, s) => Math.max(m, s.rankNumber), 0);

  if (maxNum <= 1) {
    alert('最低1行は必要です。');
    return;
  }

  const eKey = slotKey(div, rankName, maxNum, 'East');
  const wKey = slotKey(div, rankName, maxNum, 'West');

  if (assignment[eKey] || assignment[wKey]) {
    alert('この行には力士がいるため削除できません。\n力士を他の行に移動してから削除してください。');
    return;
  }

  for (const key of [eKey, wKey]) {
    slots = slots.filter(s => s.key !== key);
    delete baseline[key];
    delete assignment[key];
    userAddedSlots.delete(key);
  }
  saveAssignment();
  render();
}

/* ================================================================
   保存・復元（自動保存）
================================================================ */
function saveAssignment() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(assignment)); } catch (_) {}
}

function loadSaved() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    return s ? JSON.parse(s) : null;
  } catch (_) { return null; }
}

function validate(saved) {
  const bKeys = Object.keys(baseline);
  return bKeys.length === Object.keys(saved).filter(k => k in baseline).length;
}

/* ================================================================
   バージョン保存・履歴
================================================================ */
function getHistory() {
  try {
    const savedBasho = localStorage.getItem(BASHO_HIST_KEY);
    if (savedBasho && savedBasho !== bashoId) {
      /* 新しい場所になったら旧履歴を消す */
      localStorage.removeItem(HISTORY_KEY);
      localStorage.removeItem(BASHO_HIST_KEY);
      return [];
    }
    const s = localStorage.getItem(HISTORY_KEY);
    return s ? JSON.parse(s) : [];
  } catch (_) { return []; }
}

function saveHistory(history) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    localStorage.setItem(BASHO_HIST_KEY, bashoId);
  } catch (_) {}
}

function saveVersion() {
  const history = getHistory();
  const vNum    = history.length + 1;
  const entry   = {
    version: vNum,
    name: `ver.${vNum}`,
    timestamp: new Date().toLocaleString('ja-JP'),
    bashoId,
    assignment: JSON.parse(JSON.stringify(assignment)),
    userAddedSlots: [...userAddedSlots].map(key => {
      const s = slots.find(x => x.key === key);
      return s ? { key: s.key, rankName: s.rankName, rankNumber: s.rankNumber, side: s.side, division: s.division } : null;
    }).filter(Boolean)
  };
  history.push(entry);
  saveHistory(history);

  showNotice(`${entry.name} として保存しました`);

  /* 履歴パネルが開いていれば更新 */
  if (document.getElementById('historyPanel').classList.contains('open')) {
    renderHistoryPanel();
  }
}

function restoreVersion(idx) {
  const history = getHistory();
  const ver = history[idx];
  if (!ver) return;
  if (!confirm(`「${ver.name}」の番付を復元しますか？\n現在の予想は上書きされます。`)) return;

  /* ユーザー追加スロットを一旦全削除 */
  [...userAddedSlots].forEach(key => {
    slots = slots.filter(s => s.key !== key);
    delete baseline[key];
    delete assignment[key];
  });
  userAddedSlots = new Set();

  /* 保存時のユーザー追加スロットを復元 */
  (ver.userAddedSlots || []).forEach(savedSlot => {
    if (!slots.some(s => s.key === savedSlot.key)) {
      slots.push({ ...savedSlot, userAdded: true });
      baseline[savedSlot.key] = null;
      userAddedSlots.add(savedSlot.key);
    }
  });

  /* assignment を復元（現在のスロットキーに合わせる） */
  assignment = {};
  slots.forEach(s => {
    assignment[s.key] = (s.key in ver.assignment) ? ver.assignment[s.key] : null;
  });

  saveAssignment();
  render();
  showNotice(`「${ver.name}」を復元しました`);
}

function deleteVersion(idx) {
  const history = getHistory();
  if (!history[idx]) return;
  if (!confirm(`「${history[idx].name}」を削除しますか？`)) return;
  history.splice(idx, 1);
  /* バージョン番号は変えない（名前はそのまま保持） */
  saveHistory(history);
  renderHistoryPanel();
}

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
  } else {
    renderHistoryPanel();
    panel.classList.add('open');
  }
}

function renderHistoryPanel() {
  const list    = document.getElementById('historyList');
  const history = getHistory();

  if (!history.length) {
    list.innerHTML = '<div class="history-empty">保存された番付はまだありません</div>';
    return;
  }

  list.innerHTML = '';
  /* 新しい順に表示 */
  [...history].reverse().forEach((ver, rIdx) => {
    const realIdx = history.length - 1 - rIdx;
    const item = document.createElement('div');
    item.className = 'history-item';

    const info = document.createElement('div');
    info.innerHTML = `
      <div class="history-item-name">${ver.name}</div>
      <div class="history-item-time">${ver.timestamp}</div>`;

    const actions = document.createElement('div');
    actions.className = 'history-item-actions';

    const btnRestore = document.createElement('button');
    btnRestore.className = 'restore-btn';
    btnRestore.textContent = '復元';
    btnRestore.onclick = () => restoreVersion(realIdx);

    const btnDelete = document.createElement('button');
    btnDelete.className = 'delete-ver-btn';
    btnDelete.textContent = '削除';
    btnDelete.onclick = () => deleteVersion(realIdx);

    actions.appendChild(btnRestore);
    actions.appendChild(btnDelete);
    item.appendChild(info);
    item.appendChild(actions);
    list.appendChild(item);
  });
}

/* ================================================================
   リセット / 更新
================================================================ */
function resetBanzuke() {
  if (!confirm('番付を元の状態にリセットしますか？\n（予想した並び順・追加した行がすべて消えます）')) return;

  /* ユーザー追加スロットを削除 */
  [...userAddedSlots].forEach(key => {
    slots = slots.filter(s => s.key !== key);
    delete baseline[key];
    delete assignment[key];
  });
  userAddedSlots = new Set();

  assignment = { ...baseline };
  saveAssignment();
  render();
}

function refreshData() {
  if (!confirm('サーバーからデータを再取得します。現在の予想は消えます。よろしいですか？')) return;
  localStorage.removeItem(SAVE_KEY);
  loadData();
}

/* ================================================================
   描画
================================================================ */
function render() {
  const root = document.getElementById('banzukeInner');
  root.innerHTML = '';

  ['Makuuchi', 'Juryo', 'Makushita'].forEach(div => {
    const divSlots = slots.filter(s => s.division === div);
    if (!divSlots.length) return;

    /* 部門ヘッダー */
    root.appendChild(mkEl('div', 'div-header', '― ' + DIV_JP[div] + ' ―'));

    /* 東 / 西 列ラベル */
    const colRow = mkEl('div', 'col-labels');
    colRow.innerHTML = `
      <div class="col-label" style="text-align:right">東</div>
      <div></div>
      <div class="col-label" style="text-align:left">西</div>`;
    root.appendChild(colRow);

    /* (rankName, rankNumber) のユニーク行を収集してソート */
    const rowMap = new Map();
    divSlots.forEach(s => {
      const rk = `${s.rankName}|${s.rankNumber}`;
      if (!rowMap.has(rk)) rowMap.set(rk, { rankName: s.rankName, rankNumber: s.rankNumber });
    });
    const rows = [...rowMap.values()].sort((a, b) =>
      rowOrder(a.rankName, a.rankNumber, div) - rowOrder(b.rankName, b.rankNumber, div)
    );

    /* rankName でグループ化して描画 */
    const rankGroups = [];
    let curGroup = null;
    rows.forEach(r => {
      if (!curGroup || curGroup.rankName !== r.rankName) {
        curGroup = { rankName: r.rankName, rows: [] };
        rankGroups.push(curGroup);
      }
      curGroup.rows.push(r);
    });

    rankGroups.forEach(({ rankName, rows: rankRows }) => {
      rankRows.forEach(({ rankName: rn, rankNumber }) => {
        const eKey = slotKey(div, rn, rankNumber, 'East');
        const wKey = slotKey(div, rn, rankNumber, 'West');
        const hasE = slots.some(s => s.key === eKey);
        const hasW = slots.some(s => s.key === wKey);
        if (!hasE && !hasW) return;

        const row = mkEl('div', `banzuke-row row-${rn.toLowerCase()}`);
        row.appendChild(hasE ? makeSlot(eKey, 'east') : emptyCell('east'));

        const center = mkEl('div', `rank-center ${rankCssClass(rn)}`);
        center.style.whiteSpace = 'pre-line';
        center.textContent = rankLabel(rn, rankNumber);
        row.appendChild(center);

        row.appendChild(hasW ? makeSlot(wKey, 'west') : emptyCell('west'));
        root.appendChild(row);
      });

      /* 幕内のみ：各ランクの最終行の下に ＋/－ ボタン */
      if (div === 'Makuuchi') {
        const ctrl = document.createElement('div');
        ctrl.className = 'slot-controls';

        const jpName = RANK_JP[rankName] || rankName;
        const rn = rankName;

        const btnAdd = document.createElement('button');
        btnAdd.className = 'btn-slot';
        btnAdd.textContent = `＋ ${jpName}行を追加`;
        btnAdd.onclick = () => addRankRow(rn);

        const btnRem = document.createElement('button');
        btnRem.className = 'btn-slot';
        btnRem.textContent = `－ ${jpName}最終行を削除`;
        btnRem.onclick = () => removeRankRow(rn);

        ctrl.appendChild(btnAdd);
        ctrl.appendChild(btnRem);
        root.appendChild(ctrl);
      }
    });
  });
}

function mkEl(tag, cls, text) {
  const d = document.createElement(tag);
  if (cls)  d.className   = cls;
  if (text) d.textContent = text;
  return d;
}

function makeSlot(key, side) {
  const wrestler = assignment[key];
  const div = mkEl('div', `slot ${side}`);
  div.dataset.key = key;

  if (wrestler) {
    div.draggable = true;
    const dots = matchDotsHtml(wrestler.record);
    div.innerHTML = `
      <div class="shikona">${wrestler.shikonaJp}</div>
      <div class="prev-rank">${rankLabelFull(wrestler.originalRank)}</div>
      ${dots ? `<div class="match-dots">${dots}</div>` : ''}
      <div class="record">${formatRecord(wrestler.wins, wrestler.losses, wrestler.absences)}</div>`;
    div.addEventListener('dragstart',  onDragStart);
    div.addEventListener('dragend',    onDragEnd);
    div.addEventListener('touchstart', onTouchStart, { passive: false });
  } else {
    div.classList.add('vacant');
    div.draggable = false;
    div.innerHTML = `<div class="vacant-hint">空　き</div>`;
  }

  div.addEventListener('dragover',  onDragOver);
  div.addEventListener('dragleave', onDragLeave);
  div.addEventListener('drop',      onDrop);

  return div;
}

function emptyCell(side) {
  return mkEl('div', `slot ${side} empty`);
}

/* ================================================================
   マウス ドラッグ&ドロップ
================================================================ */
function onDragStart(e) {
  dragSrc = e.currentTarget.dataset.key;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrc);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const t = e.currentTarget;
  if (t.dataset.key && t.dataset.key !== dragSrc) t.classList.add('drag-over');
}

function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function onDrop(e) {
  e.preventDefault();
  const t = e.currentTarget;
  t.classList.remove('drag-over');
  if (t.dataset.key && t.dataset.key !== dragSrc) {
    swap(dragSrc, t.dataset.key);
  }
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  dragSrc = null;
}

/* ================================================================
   タッチ ドラッグ&ドロップ
================================================================ */
function onTouchStart(e) {
  const src = e.currentTarget;
  if (src.classList.contains('empty')) return;
  e.preventDefault();

  touchSrc  = src.dataset.key;
  touchRect = src.getBoundingClientRect();

  touchGhost = src.cloneNode(true);
  touchGhost.className = src.className + ' touch-ghost';
  touchGhost.style.cssText += `
    width:${touchRect.width}px; height:${touchRect.height}px;
    left:${touchRect.left}px;   top:${touchRect.top}px;`;
  document.body.appendChild(touchGhost);
  src.classList.add('dragging');

  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend',  onTouchEnd);
}

function onTouchMove(e) {
  e.preventDefault();
  if (!touchGhost) return;
  const t = e.touches[0];
  touchGhost.style.left = (t.clientX - touchRect.width  / 2) + 'px';
  touchGhost.style.top  = (t.clientY - touchRect.height / 2) + 'px';

  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  touchGhost.style.visibility = 'hidden';
  const under = document.elementFromPoint(t.clientX, t.clientY);
  touchGhost.style.visibility = '';
  const target = under?.closest('.slot');
  if (target && target.dataset.key && target.dataset.key !== touchSrc) {
    target.classList.add('drag-over');
  }
}

function onTouchEnd(e) {
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend',  onTouchEnd);
  if (!touchGhost) return;

  const t = e.changedTouches[0];
  touchGhost.style.visibility = 'hidden';
  const under = document.elementFromPoint(t.clientX, t.clientY);
  touchGhost.remove();
  touchGhost = null;

  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  const srcEl = document.querySelector(`[data-key="${CSS.escape(touchSrc)}"]`);
  if (srcEl) srcEl.classList.remove('dragging');

  const target = under?.closest('.slot');
  if (target && target.dataset.key && target.dataset.key !== touchSrc) {
    swap(touchSrc, target.dataset.key);
  }
  touchSrc = null;
}

/* ================================================================
   入れ替え
================================================================ */
function swap(keyA, keyB) {
  [assignment[keyA], assignment[keyB]] = [assignment[keyB], assignment[keyA]];
  saveAssignment();
  render();
}

/* ================================================================
   UI ヘルパー
================================================================ */
function showLoading(v) { document.getElementById('loadingMsg').style.display = v ? 'block' : 'none'; }
function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = msg;
  e.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

function showNotice(msg) {
  const el = document.getElementById('savedNotice');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ================================================================
   起動
================================================================ */
loadData();
</script>
